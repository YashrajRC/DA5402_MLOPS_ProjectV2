services:
  # ═══════════════════ MLflow ═══════════════════
  mlflow:
    build: ./docker/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./models:/mlflow/models
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/mlruns
      --serve-artifacts
    restart: unless-stopped
    networks: [appnet]

  # ═══════════════════ FastAPI (3 replicas) ═══════════════════
  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: mental_health_classifier
      MODEL_STAGE: Production
      BASELINE_STATS_PATH: /app/data/baseline_stats.json
      DRIFT_THRESHOLD: "0.3"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - feedback-logs:/app/logs
    depends_on:
      - mlflow
    deploy:
      replicas: 3
    restart: unless-stopped
    networks: [appnet]

  # ═══════════════════ Nginx load balancer ═══════════════════
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
    restart: unless-stopped
    networks: [appnet]

  # ═══════════════════ Streamlit ═══════════════════
  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: http://nginx:80
    volumes:
      - ./src:/app/src
    depends_on:
      - nginx
    restart: unless-stopped
    networks: [appnet]

  # ═══════════════════ Prometheus + NodeExporter + AlertManager + Grafana ═══════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./configs/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      - fastapi
    restart: unless-stopped
    networks: [appnet]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    pid: host
    restart: unless-stopped
    networks: [appnet]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    restart: unless-stopped
    networks: [appnet]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [appnet]

  # ═══════════════════ Airflow ═══════════════════
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped
    networks: [appnet]

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__SMTP__SMTP_HOST: sandbox.smtp.mailtrap.io
      AIRFLOW__SMTP__SMTP_STARTTLS: "true"
      AIRFLOW__SMTP__SMTP_SSL: "false"
      AIRFLOW__SMTP__SMTP_PORT: 2525
      AIRFLOW__SMTP__SMTP_USER: ${MAILTRAP_USER}
      AIRFLOW__SMTP__SMTP_PASSWORD: ${MAILTRAP_PASS}
      AIRFLOW__SMTP__SMTP_MAIL_FROM: airflow@project.local
      ALERT_EMAIL: ${ALERT_EMAIL}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
    user: "50000:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        airflow pools set data_prep_pool 3 "Throttle data prep tasks" || true
    networks: [appnet]

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
    user: "50000:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    restart: unless-stopped
    networks: [appnet]

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-scheduler
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
    user: "50000:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped
    networks: [appnet]

volumes:
  airflow-postgres-data:
  prometheus-data:
  grafana-data:
  feedback-logs:

networks:
  appnet:
    driver: bridge
