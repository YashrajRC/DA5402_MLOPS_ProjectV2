global:
  resolve_timeout: 5m
  smtp_from: "alertmanager@project.local"
  smtp_smarthost: "sandbox.smtp.mailtrap.io:2525"
  smtp_auth_username: "REPLACE_WITH_MAILTRAP_USER"
  smtp_auth_password: "REPLACE_WITH_MAILTRAP_PASS"
  smtp_require_tls: true

route:
  receiver: email-alerts
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: email-alerts
    email_configs:
      - to: "REPLACE_WITH_YOUR_EMAIL"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
